        .videos-section { background: #000; padding: 40px 20px; min-height: 100vh; }
        
        /* Grid de 4 colunas para Desktop */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Responsividade */
        @media (max-width: 1100px) { .videos-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { .videos-grid { grid-template-columns: 1fr; } }

        .video-header { margin-bottom: 8px; border-left: 3px solid #4facfe; padding-left: 10px; }
        .video-title { color: #fff; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .video-date { color: #4facfe; font-size: 0.7rem; }

        .video-placeholder {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 400px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .video-placeholder:hover { border-color: #4facfe; background: #1a1a1a; transform: translateY(-5px); }
        .video-placeholder i { font-size: 45px; color: #4facfe; margin-bottom: 10px; }
        .video-placeholder span { color: #fff; font-size: 11px; font-weight: 800; }

        .video-active { width: 100%; height: 400px; border-radius: 10px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
